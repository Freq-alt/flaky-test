name: CI

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes to generate run history
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        run: [1, 2, 3]  # 3 parallel runs to surface flakiness faster

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short
